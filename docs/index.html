<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B5E20">
<meta name="description" content="MAPA-GR — Análise da graduação em Física (Licenciatura + Bacharelado) no Brasil a partir dos indicadores SINAES/INEP.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>MAPA-GR — Análise da Graduação em Física</title>
<script src="chart.umd.min.js"></script>
<style>
:root {
    --azul: #1B5E20; --azul2: #2E7D32; --azul3: #0D3818;
    --accent: #E91E63; --accent2: #F48FB1;
    --verde: #27AE60; --laranja: #F39C12; --vermelho: #E74C3C;
    --bg: #F5F7FA; --card: #FFFFFF; --borda: #E0E4E8;
    --txt: #2C3E50; --txt2: #7F8C8D;
    --c1: #E74C3C; --c2: #F39C12; --c3: #F1C40F; --c4: #3498DB; --c5: #27AE60;
    --unb: #E91E63;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--txt); }

/* HEADER */
.header { background: linear-gradient(135deg, var(--azul), var(--azul2)); color: #fff;
    padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
.header-icon { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
    background: #fff; object-fit: contain; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
.header h1 span { color: var(--accent); }
.header .meta { text-align: right; font-size: 12px; opacity: .85; line-height: 1.5; }

.container { display: flex; min-height: calc(100vh - 56px); }
.sidebar { width: 320px; min-width: 320px; background: var(--card); border-right: 1px solid var(--borda);
    padding: 16px; overflow-y: auto; max-height: calc(100vh - 56px); }
.main { flex: 1; padding: 20px; overflow-y: auto; max-height: calc(100vh - 56px); }

.filter-group { margin-bottom: 16px; }
.filter-group h3 { font-size: 13px; text-transform: uppercase; color: var(--txt2);
    margin-bottom: 8px; letter-spacing: .5px; border-bottom: 2px solid var(--accent); padding-bottom: 4px; }
.filter-group label { display: block; padding: 3px 0; font-size: 13px; cursor: pointer; }
.filter-group label:hover { background: #f0f2f5; }
.filter-group input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
.filter-group select { width: 100%; padding: 6px; border: 1px solid var(--borda); border-radius: 4px; font-size: 13px; }

.ies-container { max-height: 260px; overflow-y: auto; border: 1px solid var(--borda);
    border-radius: 4px; padding: 6px; background: #FAFBFC; }

.btn { display: block; width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #C2185B; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(233,30,99,.4); }
.btn-secondary { background: var(--azul); color: #fff; }
.btn-secondary:hover { background: var(--azul3); }
.btn-export { background: var(--verde); color: #fff; }
.btn-export:hover { background: #1E8449; }
.btn-sm { display: inline-block; width: auto; padding: 5px 12px; font-size: 12px; margin: 2px; }

.card { background: var(--card); border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
    padding: 12px; margin-bottom: 10px; }
.card h2 { font-size: 13px; color: var(--azul); margin-bottom: 8px; border-bottom: 2px solid var(--c4); padding-bottom: 4px; }
.card h2.unb { border-color: var(--unb); }

.stats-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.stat-box { flex: 1; min-width: 90px; background: #F8F9FA; border-radius: 4px; padding: 6px 4px; text-align: center;
    border-left: 3px solid var(--c4); }
.stat-box.unb { border-left-color: var(--unb); background: #FCE4EC; }
.stat-box .value { font-size: 16px; font-weight: 700; color: var(--azul); }
.stat-box.unb .value { color: var(--unb); }
.stat-box .label { font-size: 9px; color: var(--txt2); text-transform: uppercase; line-height: 1.2; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { background: var(--azul); color: #fff; padding: 4px 6px; text-align: center; font-weight: 600; font-size: 10px; cursor: pointer; }
th:hover { background: var(--azul3); }
td { padding: 3px 5px; text-align: center; border-bottom: 1px solid var(--borda); }
tr:nth-child(even) { background: #F8F9FA; }
tr.row-unb { background: #FCE4EC !important; font-weight: 700; }
tr.row-unb td { color: var(--unb); }
tr:hover { background: #EEF2F7; }

/* CPC faixas em cores */
.cpc-1 { background: #FFCDD2; color: #B71C1C; font-weight: 700; }
.cpc-2 { background: #FFE0B2; color: #E65100; font-weight: 700; }
.cpc-3 { background: #FFF9C4; color: #F57F17; font-weight: 700; }
.cpc-4 { background: #BBDEFB; color: #0D47A1; font-weight: 700; }
.cpc-5 { background: #C8E6C9; color: #1B5E20; font-weight: 700; }

.chart-container { position: relative; height: 400px; margin: 12px 0; }
.chart-row { display: flex; gap: 16px; flex-wrap: wrap; }
.chart-half { flex: 1; min-width: 400px; }

.report-box { background: #1A1A2E; color: #E0E0E0; padding: 16px; border-radius: 6px;
    font-family: 'Consolas', 'Courier New', monospace; font-size: 12px;
    white-space: pre-wrap; max-height: 500px; overflow-y: auto; line-height: 1.6; }

.loading { text-align: center; padding: 60px; }
.loading .spinner { width: 48px; height: 48px; border: 4px solid var(--borda);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.status-bar { background: var(--azul3); color: #aaa; padding: 4px 24px; font-size: 11px;
    display: flex; justify-content: space-between; }

/* RESPONSIVE */
.menu-toggle { display: none; background: none; border: none; color: #fff; font-size: 26px;
    cursor: pointer; padding: 4px 10px; margin-right: 8px; }
.sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5); z-index: 90; }
.sidebar-overlay.show { display: block; }

@media (max-width: 900px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; min-width: auto; max-height: none; }
    .main { max-height: none; padding: 12px; }
    .chart-half { min-width: 100%; }
}

@media (max-width: 768px) {
    .header { padding: 10px 14px; }
    .header-left { gap: 8px; }
    .header-icon { width: 36px; height: 36px; }
    .header h1 { font-size: 15px; line-height: 1.2; }
    .header h1 span { display: block; font-size: 18px; margin-bottom: 2px; }
    .header .meta { font-size: 10px; }
    .menu-toggle { display: inline-block; }
    .container { flex-direction: column; min-height: calc(100vh - 64px); }
    .sidebar { position: fixed; top: 64px; left: -100%; width: 86%; max-width: 320px;
        height: calc(100vh - 64px); max-height: none; z-index: 100; transition: left .3s;
        box-shadow: 2px 0 12px rgba(0,0,0,.25); }
    .sidebar.open { left: 0; }
    .main { padding: 10px; max-height: none; }
    .stats-row { gap: 4px; }
    .stat-box { min-width: 70px; padding: 5px 3px; }
    .stat-box .value { font-size: 14px; }
    .card { padding: 8px; margin-bottom: 8px; border-radius: 4px; }
    .card h2 { font-size: 12px; }
    .chart-container { height: 260px; margin: 8px 0; }
    .chart-half { min-width: 100%; }
    .chart-row { gap: 8px; }
    table { font-size: 10px; }
    th, td { padding: 3px 4px; }
    .btn { padding: 9px; font-size: 13px; }
    .report-box { font-size: 10px; padding: 10px; max-height: 360px; }
    .status-bar { padding: 4px 10px; font-size: 9px; flex-wrap: wrap; gap: 4px; }
}

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--verde); color: #fff;
    padding: 12px 20px; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 12px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .3s; z-index: 999; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir filtros">☰</button>
        <img src="icons/icon-192.png" alt="Mapa-GR" class="header-icon">
        <h1><span>MAPA-GR</span> — Análise da Graduação em Física (INEP/SINAES)</h1>
    </div>
    <div class="meta">
        <div>Prof. David L. Azevedo</div>
        <div id="headerDate"></div>
        <div id="headerVersion">v1.0</div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="container">
    <div class="sidebar" id="sidebar">
        <div class="filter-group">
            <h3>Ciclo ENADE</h3>
            <label><input type="checkbox" id="y2017" value="2017" checked> 2017 (Lic + Bach)</label>
            <label><input type="checkbox" id="y2021" value="2021" checked> 2021 (só Lic)</label>
        </div>

        <div class="filter-group">
            <h3>Grau acadêmico</h3>
            <label><input type="checkbox" id="gLic" value="Licenciatura" checked> Licenciatura</label>
            <label><input type="checkbox" id="gBac" value="Bacharelado" checked> Bacharelado</label>
        </div>

        <div class="filter-group">
            <h3>Modalidade</h3>
            <label><input type="checkbox" id="mPres" value="Presencial" checked> Presencial</label>
            <label><input type="checkbox" id="mEad" value="EAD" checked> EAD</label>
        </div>

        <div class="filter-group">
            <h3>Categoria administrativa</h3>
            <label><input type="checkbox" class="cat-chk" value="Pública Federal" checked> Pública Federal</label>
            <label><input type="checkbox" class="cat-chk" value="Pública Estadual" checked> Pública Estadual</label>
            <label><input type="checkbox" class="cat-chk" value="Pública Municipal" checked> Pública Municipal</label>
            <label><input type="checkbox" class="cat-chk" value="Privada sem fins lucrativos" checked> Privada s/ fins</label>
            <label><input type="checkbox" class="cat-chk" value="Privada com fins lucrativos" checked> Privada c/ fins</label>
            <label><input type="checkbox" class="cat-chk" value="Especial" checked> Especial</label>
        </div>

        <div class="filter-group">
            <h3>Faixa CPC</h3>
            <label><input type="checkbox" class="pf-chk" value="1"> CPC 1</label>
            <label><input type="checkbox" class="pf-chk" value="2"> CPC 2</label>
            <label><input type="checkbox" class="pf-chk" value="3" checked> CPC 3</label>
            <label><input type="checkbox" class="pf-chk" value="4" checked> CPC 4</label>
            <label><input type="checkbox" class="pf-chk" value="5" checked> CPC 5</label>
        </div>

        <div class="filter-group">
            <h3>Região</h3>
            <label><input type="checkbox" class="reg-chk" value="N" checked> Norte</label>
            <label><input type="checkbox" class="reg-chk" value="NE" checked> Nordeste</label>
            <label><input type="checkbox" class="reg-chk" value="CO" checked> Centro-Oeste</label>
            <label><input type="checkbox" class="reg-chk" value="SE" checked> Sudeste</label>
            <label><input type="checkbox" class="reg-chk" value="S" checked> Sul</label>
        </div>

        <div class="filter-group">
            <h3>Métrica principal</h3>
            <select id="selMetrica">
                <option value="pc" selected>CPC contínuo</option>
                <option value="e">ENADE contínuo</option>
                <option value="ip">IDD padronizada</option>
                <option value="dr">% Doutores (padronizada)</option>
                <option value="ms">% Mestres (padronizada)</option>
                <option value="rg">Regime de trabalho (padronizada)</option>
                <option value="nf">Infraestrutura (padronizada)</option>
                <option value="op">Org. Didático-Pedagógica (padronizada)</option>
            </select>
        </div>

        <button class="btn btn-primary" id="btnAnalisar" onclick="analisar()">Analisar</button>
        <button class="btn btn-secondary" onclick="marcarTodos()">Marcar todos</button>
        <button class="btn btn-secondary" onclick="desmarcarTodos()">Desmarcar todos</button>
        <button class="btn btn-export" onclick="exportCSV()">Exportar CSV</button>
        <button class="btn btn-export" onclick="exportarPNGs()">Exportar PNGs</button>
        <button class="btn btn-secondary" onclick="abrirHelp()">Help</button>
    </div>

    <div class="main" id="main">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Carregando dados do INEP...</p>
        </div>
        <div id="results" style="display:none;"></div>
    </div>
</div>

<div class="status-bar">
    <span id="statusLeft">Pronto</span>
    <span id="statusRight">MAPA-GR v1.0 | Prof. David L. Azevedo</span>
</div>

<div class="toast" id="toast"></div>

<script id="dadosEmbutidos" type="application/json">null</script>
<script>
const VERSION = '1.0';
const UF_REGIAO = {
    'AC':'N','AM':'N','AP':'N','PA':'N','RO':'N','RR':'N','TO':'N',
    'AL':'NE','BA':'NE','CE':'NE','MA':'NE','PB':'NE','PE':'NE','PI':'NE','RN':'NE','SE':'NE',
    'DF':'CO','GO':'CO','MT':'CO','MS':'CO',
    'ES':'SE','MG':'SE','RJ':'SE','SP':'SE',
    'PR':'S','RS':'S','SC':'S'
};
const CPC_COLORS = { 1:'#E74C3C', 2:'#F39C12', 3:'#F1C40F', 4:'#3498DB', 5:'#27AE60' };
const METRIC_LABELS = {
    pc:'CPC contínuo', e:'ENADE contínuo', ip:'IDD padronizada',
    dr:'% Doutores (pad)', ms:'% Mestres (pad)', rg:'Regime trabalho (pad)',
    nf:'Infraestrutura (pad)', op:'Org. Didático-Ped. (pad)'
};

let DATA = null;
let _charts = {};
let _sortCol = null;
let _sortDir = 1;

function setStatus(msg) { document.getElementById('statusLeft').textContent = msg; }
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function loadData() {
    const embed = document.getElementById('dadosEmbutidos').textContent;
    try {
        const parsed = JSON.parse(embed);
        if (parsed && parsed.cursos) {
            DATA = parsed;
            onDataLoaded();
            return;
        }
    } catch (e) {}
    fetch('dados_inep.json')
        .then(r => r.json())
        .then(d => { DATA = d; onDataLoaded(); })
        .catch(err => {
            document.getElementById('loading').innerHTML = '<p style="color:red;">Erro ao carregar dados_inep.json: ' + err.message + '</p>';
        });
}

function onDataLoaded() {
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('pt-BR');
    document.getElementById('headerVersion').textContent = 'v' + VERSION;
    setStatus(`${DATA.cursos.length} cursos carregados de ${DATA.metadata.n_ies} IES`);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    analisar();
}

loadData();

function getFilters() {
    const anos = [];
    if (document.getElementById('y2017').checked) anos.push(2017);
    if (document.getElementById('y2021').checked) anos.push(2021);
    const graus = [];
    if (document.getElementById('gLic').checked) graus.push('Licenciatura');
    if (document.getElementById('gBac').checked) graus.push('Bacharelado');
    const modais = [];
    if (document.getElementById('mPres').checked) modais.push('Presencial');
    if (document.getElementById('mEad').checked) modais.push('EAD');
    const cats = [...document.querySelectorAll('.cat-chk:checked')].map(e => e.value);
    const pfs = [...document.querySelectorAll('.pf-chk:checked')].map(e => +e.value);
    const regs = [...document.querySelectorAll('.reg-chk:checked')].map(e => e.value);
    const metrica = document.getElementById('selMetrica').value;
    return { anos, graus, modais, cats, pfs, regs, metrica };
}

function normModal(m) {
    if (!m) return '';
    return m.toLowerCase().includes('distân') || m.toLowerCase().includes('dista') ? 'EAD' : 'Presencial';
}

function filterCursos(f) {
    return DATA.cursos.filter(c => {
        if (!f.anos.includes(c.y)) return false;
        if (!f.graus.includes(c.g)) return false;
        if (!f.modais.includes(normModal(c.m))) return false;
        if (!f.cats.includes(c.ct)) return false;
        if (c.pf != null && !f.pfs.includes(c.pf)) return false;
        if (c.pf == null) return false;
        const r = UF_REGIAO[c.u];
        if (!f.regs.includes(r)) return false;
        return true;
    });
}

function mean(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function analisar() {
    const f = getFilters();
    const cursos = filterCursos(f);
    const main = document.getElementById('results');

    if (cursos.length === 0) {
        main.innerHTML = '<div class="card"><h2>Nenhum curso encontrado</h2><p>Ajuste os filtros na barra lateral.</p></div>';
        setStatus('Filtro vazio');
        return;
    }

    const metrica = f.metrica;
    const metricaLabel = METRIC_LABELS[metrica];

    // Stats
    const vals = cursos.map(c => c[metrica]).filter(v => v != null);
    const avg = mean(vals);
    const fs = {};
    cursos.forEach(c => { if (c.pf != null) fs[c.pf] = (fs[c.pf]||0)+1; });
    const ufs = new Set(cursos.map(c => c.u));
    const ies = new Set(cursos.map(c => c.sg));

    let html = `<div class="card"><h2>Visão geral</h2><div class="stats-row">
        <div class="stat-box"><div class="value">${cursos.length}</div><div class="label">Cursos</div></div>
        <div class="stat-box"><div class="value">${ies.size}</div><div class="label">IES</div></div>
        <div class="stat-box"><div class="value">${ufs.size}</div><div class="label">UFs</div></div>
        <div class="stat-box"><div class="value">${avg.toFixed(2)}</div><div class="label">${metricaLabel} (média)</div></div>
        <div class="stat-box" style="border-left-color:#C8E6C9;"><div class="value">${fs[5]||0}</div><div class="label">CPC 5</div></div>
        <div class="stat-box" style="border-left-color:#BBDEFB;"><div class="value">${fs[4]||0}</div><div class="label">CPC 4</div></div>
        <div class="stat-box" style="border-left-color:#FFF9C4;"><div class="value">${fs[3]||0}</div><div class="label">CPC 3</div></div>
        <div class="stat-box" style="border-left-color:#FFE0B2;"><div class="value">${fs[2]||0}</div><div class="label">CPC 2</div></div>
        <div class="stat-box" style="border-left-color:#FFCDD2;"><div class="value">${fs[1]||0}</div><div class="label">CPC 1</div></div>
    </div></div>`;

    // UnB
    const unbCursos = cursos.filter(c => c.sg === 'UNB' || c.sg === 'UnB');
    if (unbCursos.length) {
        html += `<div class="card"><h2 class="unb">★ Universidade de Brasília</h2><div class="stats-row">`;
        unbCursos.forEach(c => {
            const cpcBadge = c.pf != null ? `<span class="cpc-${c.pf}" style="padding:2px 6px;border-radius:4px;">CPC ${c.pf}</span>` : 'SC';
            html += `<div class="stat-box unb" style="min-width:180px;"><div class="value">${cpcBadge}</div><div class="label">${c.g} ${c.y} — ${c.mu}</div></div>`;
        });
        html += `</div></div>`;
    }

    // Tabela ranking
    const sorted = [...cursos].sort((a,b) => (b[metrica]||-999) - (a[metrica]||-999));
    html += `<div class="card"><h2>Ranking de cursos (${cursos.length}) — ordenado por ${metricaLabel}</h2>
        <p style="font-size:11px;color:#7F8C8D;margin-bottom:8px;">Clique no cabeçalho para reordenar.</p>
        <div class="tbl-wrap"><table id="tabelaCursos"><thead><tr>
            <th data-col="sg">Sigla</th>
            <th data-col="u">UF</th>
            <th data-col="y">Ano</th>
            <th data-col="g">Grau</th>
            <th data-col="m">Modal</th>
            <th data-col="mu">Município</th>
            <th data-col="pf">CPC</th>
            <th data-col="pc">CPC cont</th>
            <th data-col="e">ENADE</th>
            <th data-col="ip">IDD</th>
            <th data-col="dr">%Dr</th>
            <th data-col="nf">Infra</th>
            <th data-col="np">N.part</th>
        </tr></thead><tbody>`;
    sorted.forEach(c => {
        const rowClass = (c.sg === 'UNB' || c.sg === 'UnB') ? 'row-unb' : '';
        const pfCell = c.pf != null ? `<td class="cpc-${c.pf}">${c.pf}</td>` : '<td>—</td>';
        const modal = normModal(c.m);
        html += `<tr class="${rowClass}">
            <td><b>${c.sg || '—'}</b></td>
            <td>${c.u || '—'}</td>
            <td>${c.y}</td>
            <td>${c.g[0]}</td>
            <td>${modal[0]}</td>
            <td style="text-align:left;">${c.mu || '—'}</td>
            ${pfCell}
            <td>${c.pc != null ? c.pc.toFixed(2) : '—'}</td>
            <td>${c.e != null ? c.e.toFixed(2) : '—'}</td>
            <td>${c.ip != null ? c.ip.toFixed(2) : '—'}</td>
            <td>${c.dr != null ? c.dr.toFixed(2) : '—'}</td>
            <td>${c.nf != null ? c.nf.toFixed(2) : '—'}</td>
            <td>${c.np != null ? c.np : '—'}</td>
        </tr>`;
    });
    html += `</tbody></table></div></div>`;

    // Gráficos
    html += `<div class="card"><h2>Distribuição por faixa CPC</h2>
        <div class="chart-container"><canvas id="chartFaixas"></canvas></div></div>`;

    html += `<div class="card"><h2>Top IES por ${metricaLabel} (média)</h2>
        <div class="chart-container"><canvas id="chartIES"></canvas></div></div>`;

    html += `<div class="card"><h2>Cursos por UF</h2>
        <div class="chart-container"><canvas id="chartUF"></canvas></div></div>`;

    if (f.anos.length === 2) {
        html += `<div class="card"><h2>Evolução 2017 → 2021 (Licenciatura) — ${metricaLabel}</h2>
            <div class="chart-container"><canvas id="chartEvol"></canvas></div>
            <p style="font-size:11px;color:#7F8C8D;">Compara médias nacionais dos dois ciclos ENADE de Licenciatura em Física.</p></div>`;
    }

    // Relatório textual
    html += `<div class="card"><h2>Relatório textual</h2><div class="report-box" id="reportBox"></div></div>`;

    main.innerHTML = html;

    // Render charts after DOM
    setTimeout(() => {
        renderCharts(cursos, f);
        bindSortable();
        buildReport(cursos, f);
    }, 30);
    setStatus(`${cursos.length} cursos mostrados`);
}

function bindSortable() {
    document.querySelectorAll('#tabelaCursos th').forEach(th => {
        th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (!col) return;
            if (_sortCol === col) _sortDir = -_sortDir;
            else { _sortCol = col; _sortDir = -1; }
            const tbody = th.closest('table').querySelector('tbody');
            const rows = [...tbody.querySelectorAll('tr')];
            rows.sort((a, b) => {
                const ai = [...a.cells].map(c => c.textContent);
                const bi = [...b.cells].map(c => c.textContent);
                const colIdx = [...th.parentElement.children].indexOf(th);
                let va = ai[colIdx]; let vb = bi[colIdx];
                const na = parseFloat(va); const nb = parseFloat(vb);
                if (!isNaN(na) && !isNaN(nb)) return (na - nb) * _sortDir;
                return va.localeCompare(vb) * _sortDir;
            });
            rows.forEach(r => tbody.appendChild(r));
        });
    });
}

function destroyCharts() {
    Object.values(_charts).forEach(c => { try { c.destroy(); } catch(e){} });
    _charts = {};
}

function renderCharts(cursos, f) {
    destroyCharts();

    // 1. Distribuicao por faixa CPC
    const faixas = [1,2,3,4,5];
    const dataFaixa = faixas.map(fx => cursos.filter(c => c.pf === fx).length);
    _charts.faixas = new Chart(document.getElementById('chartFaixas'), {
        type: 'bar',
        data: {
            labels: faixas.map(fx => `CPC ${fx}`),
            datasets: [{
                label: 'Nº de cursos',
                data: dataFaixa,
                backgroundColor: faixas.map(fx => CPC_COLORS[fx]),
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false },
                tooltip: { callbacks: { label: (ctx) => `${ctx.parsed.y} cursos` } } },
            scales: { y: { beginAtZero: true, title: { display: true, text: 'Nº de cursos' } } }
        }
    });

    // 2. Top IES por metrica media
    const metrica = f.metrica;
    const iesMap = {};
    cursos.forEach(c => {
        if (c[metrica] == null) return;
        if (!iesMap[c.sg]) iesMap[c.sg] = { vals: [], ufs: new Set(), is_unb: (c.sg === 'UNB' || c.sg === 'UnB') };
        iesMap[c.sg].vals.push(c[metrica]);
        iesMap[c.sg].ufs.add(c.u);
    });
    const iesList = Object.entries(iesMap).map(([sg, info]) => ({
        sg, avg: mean(info.vals), n: info.vals.length, ufs: [...info.ufs], is_unb: info.is_unb
    })).sort((a,b) => b.avg - a.avg).slice(0, 20);
    const topColors = iesList.map(p => p.is_unb ? '#E91E63' : '#3498DB');

    _charts.ies = new Chart(document.getElementById('chartIES'), {
        type: 'bar',
        data: {
            labels: iesList.map(p => p.is_unb ? `★ ${p.sg}` : p.sg),
            datasets: [{
                label: METRIC_LABELS[metrica],
                data: iesList.map(p => p.avg),
                backgroundColor: topColors,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false },
                tooltip: { callbacks: { label: (ctx) => {
                    const p = iesList[ctx.dataIndex];
                    return [`${METRIC_LABELS[metrica]}: ${p.avg.toFixed(3)}`, `Cursos: ${p.n}`, `UFs: ${p.ufs.join(', ')}`];
                }}}
            },
            scales: { x: { beginAtZero: true } }
        }
    });

    // 3. Cursos por UF (barras)
    const ufMap = {};
    cursos.forEach(c => { ufMap[c.u] = (ufMap[c.u]||0) + 1; });
    const ufEntries = Object.entries(ufMap).sort((a,b) => b[1]-a[1]);

    _charts.uf = new Chart(document.getElementById('chartUF'), {
        type: 'bar',
        data: {
            labels: ufEntries.map(e => e[0]),
            datasets: [{
                label: 'Nº de cursos',
                data: ufEntries.map(e => e[1]),
                backgroundColor: ufEntries.map(e => {
                    const r = UF_REGIAO[e[0]];
                    return { N:'#27AE60', NE:'#F39C12', CO:'#9B59B6', SE:'#3498DB', S:'#E74C3C' }[r] || '#95A5A6';
                })
            }]
        },
        options: { responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, title: { display: true, text: 'Nº de cursos' } } } }
    });

    // 4. Evolucao 2017 -> 2021 (Licenciatura)
    if (document.getElementById('chartEvol')) {
        const lic17 = cursos.filter(c => c.y === 2017 && c.g === 'Licenciatura').map(c => c[metrica]).filter(v => v != null);
        const lic21 = cursos.filter(c => c.y === 2021 && c.g === 'Licenciatura').map(c => c[metrica]).filter(v => v != null);
        _charts.evol = new Chart(document.getElementById('chartEvol'), {
            type: 'line',
            data: {
                labels: ['2017', '2021'],
                datasets: [{
                    label: `${METRIC_LABELS[metrica]} — média nacional (Licenciatura)`,
                    data: [mean(lic17), mean(lic21)],
                    borderColor: '#1B5E20', backgroundColor: 'rgba(27,94,32,0.2)',
                    tension: 0.1, fill: true, pointRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false,
                plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.parsed.y.toFixed(3)} (n=${ctx.dataIndex===0?lic17.length:lic21.length})` } } },
                scales: { y: { beginAtZero: false } } }
        });
    }
}

function buildReport(cursos, f) {
    const metricaLabel = METRIC_LABELS[f.metrica];
    const lines = [];
    const p = (s) => lines.push(s);
    p('═══════════════════════════════════════════════════════════');
    p(`  MAPA-GR — Relatório de Análise`);
    p(`  ${new Date().toLocaleString('pt-BR')}`);
    p('═══════════════════════════════════════════════════════════');
    p('');
    p(`FILTROS APLICADOS:`);
    p(`  Ciclos: ${f.anos.join(', ')}`);
    p(`  Graus: ${f.graus.join(', ')}`);
    p(`  Modalidades: ${f.modais.join(', ')}`);
    p(`  Categorias: ${f.cats.length}/6 selecionadas`);
    p(`  Faixas CPC: ${f.pfs.join(', ')}`);
    p(`  Regiões: ${f.regs.join(', ')}`);
    p(`  Métrica: ${metricaLabel}`);
    p('');
    p(`RESULTADOS:`);
    p(`  Total de cursos: ${cursos.length}`);
    const ies = new Set(cursos.map(c => c.sg));
    p(`  IES distintas: ${ies.size}`);
    p(`  UFs: ${new Set(cursos.map(c=>c.u)).size}`);
    const vals = cursos.map(c => c[f.metrica]).filter(v => v != null);
    if (vals.length) {
        p(`  ${metricaLabel} — média: ${mean(vals).toFixed(3)}`);
        p(`  ${metricaLabel} — máximo: ${Math.max(...vals).toFixed(3)}`);
        p(`  ${metricaLabel} — mínimo: ${Math.min(...vals).toFixed(3)}`);
    }
    p('');

    // Distribuicao CPC
    p('DISTRIBUIÇÃO POR FAIXA CPC:');
    for (let fx = 5; fx >= 1; fx--) {
        const n = cursos.filter(c => c.pf === fx).length;
        const pct = cursos.length ? (n*100/cursos.length).toFixed(1) : '0.0';
        const bar = '█'.repeat(Math.round(n*30/Math.max(1,cursos.length)));
        p(`  CPC ${fx}: ${String(n).padStart(4)} (${pct.padStart(5)}%) ${bar}`);
    }
    p('');

    // UnB highlight
    const unbCursos = cursos.filter(c => c.sg === 'UNB' || c.sg === 'UnB');
    if (unbCursos.length) {
        p('★ UNIVERSIDADE DE BRASÍLIA:');
        unbCursos.forEach(c => {
            p(`  ${c.g} ${c.y} — ${c.mu}/${c.u}`);
            p(`    CPC faixa: ${c.pf || 'SC'} | CPC cont: ${c.pc != null ? c.pc.toFixed(3) : '—'}`);
            p(`    ENADE: ${c.e != null ? c.e.toFixed(3) : '—'} | IDD pad: ${c.ip != null ? c.ip.toFixed(3) : '—'}`);
            p(`    %Doutores: ${c.dr != null ? c.dr.toFixed(3) : '—'} | Infra: ${c.nf != null ? c.nf.toFixed(3) : '—'}`);
        });
        p('');
    }

    // Top 15 cursos
    p('TOP 15 CURSOS POR ' + metricaLabel.toUpperCase() + ':');
    const sorted = [...cursos].filter(c => c[f.metrica] != null)
        .sort((a,b) => b[f.metrica] - a[f.metrica]);
    sorted.slice(0, 15).forEach((c, i) => {
        const mark = (c.sg === 'UNB' || c.sg === 'UnB') ? '★ ' : '  ';
        p(`  ${mark}${String(i+1).padStart(2)}. ${c.sg.padEnd(10)} ${c.u} ${c.y} ${c.g[0]} | ${f.metrica}=${c[f.metrica].toFixed(3)} | CPC ${c.pf || '?'} | ${c.mu}`);
    });
    p('');

    // Top 10 IES
    p('TOP 10 IES POR ' + metricaLabel.toUpperCase() + ' (MÉDIA):');
    const iesMap = {};
    cursos.forEach(c => {
        if (c[f.metrica] == null) return;
        if (!iesMap[c.sg]) iesMap[c.sg] = { vals: [], ufs: new Set() };
        iesMap[c.sg].vals.push(c[f.metrica]);
        iesMap[c.sg].ufs.add(c.u);
    });
    const iesArr = Object.entries(iesMap).map(([sg,i]) => ({
        sg, avg: mean(i.vals), n: i.vals.length, ufs: [...i.ufs]
    })).sort((a,b) => b.avg - a.avg);
    iesArr.slice(0, 10).forEach((p2, i) => {
        const mark = (p2.sg === 'UNB' || p2.sg === 'UnB') ? '★ ' : '  ';
        p(`  ${mark}${String(i+1).padStart(2)}. ${p2.sg.padEnd(10)} | ${f.metrica}=${p2.avg.toFixed(3)} | cursos=${p2.n} | ${p2.ufs.join('/')}`);
    });
    p('');
    p(`Prof. David L. Azevedo | MAPA-GR v${VERSION}`);
    p('Dados: INEP — Indicadores de Qualidade da Educação Superior');

    document.getElementById('reportBox').textContent = lines.join('\n');
}

function marcarTodos() {
    document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(e => e.checked = true);
}
function desmarcarTodos() {
    document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(e => e.checked = false);
}

function exportCSV() {
    const f = getFilters();
    const cursos = filterCursos(f);
    if (!cursos.length) { toast('Nada a exportar'); return; }
    const header = ['ano','sigla','ies','uf','municipio','grau','modalidade','categoria','cpc_faixa','cpc_cont','enade_cont','idd_pad','odp_pad','infra_pad','opf_pad','mestres_pad','doutores_pad','regime_pad','n_inscritos','n_participantes'];
    const rows = cursos.map(c => [
        c.y, c.sg, `"${(c.ie||'').replace(/"/g,'""')}"`, c.u, `"${(c.mu||'').replace(/"/g,'""')}"`,
        c.g, normModal(c.m), c.ct, c.pf||'', c.pc||'', c.e||'', c.ip||'', c.op||'', c.nf||'', c.of||'',
        c.ms||'', c.dr||'', c.rg||'', c.ni||'', c.np||''
    ].join(';'));
    let csv = '# MAPA-GR v' + VERSION + ' — ' + new Date().toLocaleString('pt-BR') + '\n';
    csv += '# Prof. David L. Azevedo | Fonte: INEP Dados Abertos\n';
    csv += header.join(';') + '\n' + rows.join('\n');
    const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mapa-gr-export-' + new Date().toISOString().replace(/[-:T]/g,'').slice(0,14) + '.csv';
    a.click();
    toast(`${cursos.length} cursos exportados em CSV`);
}

function exportarPNGs() {
    const canvases = document.querySelectorAll('#results canvas');
    if (!canvases.length) { toast('Nenhum gráfico para exportar'); return; }
    canvases.forEach((cv, i) => {
        cv.toBlob((blob) => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `mapa-gr-grafico-${i+1}-` + new Date().toISOString().replace(/[-:T]/g,'').slice(0,14) + '.png';
            a.click();
        }, 'image/png');
    });
    toast(`${canvases.length} gráficos exportados`);
}

function abrirHelp() {
    window.open('help-doc.html', '_blank');
}

<script>
// PWA: sidebar mobile toggle
(function() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggle = document.getElementById('menuToggle');
    if (!toggle) return;
    function open() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    function close() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    toggle.addEventListener('click', () => sidebar.classList.contains('open') ? close() : open());
    overlay.addEventListener('click', close);
    document.addEventListener('click', (e) => {
        if (window.innerWidth > 768) return;
        if (e.target && e.target.id === 'btnAnalisar') close();
    });
})();

// PWA: service worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW registrado:', reg.scope))
            .catch(err => console.warn('SW falhou:', err));
    });
}
</script>
